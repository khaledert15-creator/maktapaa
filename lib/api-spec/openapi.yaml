openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Maktaba Dot Com - Arabic RTL E-commerce API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: products
  - name: categories
  - name: cart
  - name: orders
  - name: customers
  - name: admin
  - name: shipping
  - name: coupons
  - name: content
  - name: reviews

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ────────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: registerCustomer
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerRegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: loginCustomer
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logoutCustomer
      tags: [auth]
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getCurrentCustomer
      tags: [auth]
      responses:
        "200":
          description: Current customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  # ─── ADMIN AUTH ──────────────────────────────────────────────────────────────
  /auth/admin/login:
    post:
      operationId: loginAdmin
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Admin logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResponse"

  /auth/admin/logout:
    post:
      operationId: logoutAdmin
      tags: [auth]
      responses:
        "204":
          description: Admin logged out

  /auth/admin/me:
    get:
      operationId: getCurrentAdmin
      tags: [auth]
      responses:
        "200":
          description: Current admin user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  # ─── PRODUCTS (PUBLIC) ───────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 24 }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: stageId
          schema: { type: integer }
        - in: query
          name: gradeId
          schema: { type: integer }
        - in: query
          name: subjectId
          schema: { type: integer }
        - in: query
          name: publisherId
          schema: { type: integer }
        - in: query
          name: categoryId
          schema: { type: integer }
        - in: query
          name: educationType
          schema: { type: string }
        - in: query
          name: bookType
          schema: { type: string }
        - in: query
          name: author
          schema: { type: string }
        - in: query
          name: schoolYear
          schema: { type: string }
        - in: query
          name: minPrice
          schema: { type: number }
        - in: query
          name: maxPrice
          schema: { type: number }
        - in: query
          name: inStock
          schema: { type: boolean }
        - in: query
          name: hasDiscount
          schema: { type: boolean }
        - in: query
          name: isBestSeller
          schema: { type: boolean }
        - in: query
          name: isNew
          schema: { type: boolean }
        - in: query
          name: isRevision
          schema: { type: boolean }
        - in: query
          name: isBundle
          schema: { type: boolean }
        - in: query
          name: isOffer
          schema: { type: boolean }
        - in: query
          name: isFeatured
          schema: { type: boolean }
        - in: query
          name: freeShipping
          schema: { type: boolean }
        - in: query
          name: sortBy
          schema: { type: string, enum: [newest, best_selling, price_asc, price_desc, discount, recommended] }
      responses:
        "200":
          description: Paginated products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

  /products/featured:
    get:
      operationId: listFeaturedProducts
      tags: [products]
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductSummary"

  /products/search/suggestions:
    get:
      operationId: getSearchSuggestions
      tags: [products]
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Search suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchSuggestionsResponse"

  /products/{slug}:
    get:
      operationId: getProduct
      tags: [products]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

  /products/{id}/related:
    get:
      operationId: getRelatedProducts
      tags: [products]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Related products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductSummary"

  /products/{id}/frequently-bought:
    get:
      operationId: getFrequentlyBoughtProducts
      tags: [products]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Products frequently purchased together
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductSummary"

  # ─── CATEGORIES / CLASSIFICATIONS (PUBLIC) ───────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      responses:
        "200":
          description: All categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /stages:
    get:
      operationId: listStages
      tags: [categories]
      responses:
        "200":
          description: Educational stages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stage"

  /grades:
    get:
      operationId: listGrades
      tags: [categories]
      parameters:
        - in: query
          name: stageId
          schema: { type: integer }
      responses:
        "200":
          description: School grades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Grade"

  /subjects:
    get:
      operationId: listSubjects
      tags: [categories]
      parameters:
        - in: query
          name: stageId
          schema: { type: integer }
        - in: query
          name: gradeId
          schema: { type: integer }
      responses:
        "200":
          description: Subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subject"

  /publishers:
    get:
      operationId: listPublishers
      tags: [categories]
      responses:
        "200":
          description: Publishers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Publisher"

  /governorates:
    get:
      operationId: listGovernorates
      tags: [shipping]
      responses:
        "200":
          description: Egyptian governorates with shipping info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Governorate"

  /governorates/{id}/cities:
    get:
      operationId: listGovernorateCities
      tags: [shipping]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Active cities for a governorate
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/City"

  /shipping/quote:
    post:
      operationId: getShippingQuote
      tags: [shipping]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShippingQuoteInput"
      responses:
        "200":
          description: Unified shipping calculation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShippingQuote"

  # ─── CART ────────────────────────────────────────────────────────────────────
  /cart:
    get:
      operationId: getCart
      tags: [cart]
      responses:
        "200":
          description: Current cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/items:
    post:
      operationId: addToCart
      tags: [cart]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemInput"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/items/{productId}:
    patch:
      operationId: updateCartItem
      tags: [cart]
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemUpdate"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    delete:
      operationId: removeFromCart
      tags: [cart]
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/coupon:
    post:
      operationId: applyCoupon
      tags: [cart]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponApplyInput"
      responses:
        "200":
          description: Cart with coupon applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    delete:
      operationId: removeCoupon
      tags: [cart]
      responses:
        "200":
          description: Cart without coupon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  # ─── ORDERS (PUBLIC) ─────────────────────────────────────────────────────────
  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/track:
    get:
      operationId: trackOrder
      tags: [orders]
      parameters:
        - in: query
          name: orderNumber
          required: true
          schema: { type: string }
        - in: query
          name: mobile
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order tracking info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderTracking"
        "404":
          description: Not found

  /orders/confirmation/{orderNumber}:
    get:
      operationId: getOrderConfirmation
      tags: [orders]
      parameters:
        - in: path
          name: orderNumber
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order created in the current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /orders/my:
    get:
      operationId: getMyOrders
      tags: [orders]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
      responses:
        "200":
          description: Customer orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"

  /orders/my/{id}:
    get:
      operationId: getMyOrder
      tags: [orders]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /orders/{id}/cancel-request:
    post:
      operationId: requestOrderCancellation
      tags: [orders]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancellationRequestInput"
      responses:
        "201":
          description: Cancellation request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancellationRequest"

  # ─── CUSTOMER ACCOUNT ────────────────────────────────────────────────────────
  /customers/me/profile:
    patch:
      operationId: updateCustomerProfile
      tags: [customers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/me/addresses:
    get:
      operationId: listCustomerAddresses
      tags: [customers]
      responses:
        "200":
          description: Customer addresses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Address"
    post:
      operationId: addCustomerAddress
      tags: [customers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressInput"
      responses:
        "201":
          description: Address created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"

  /customers/me/addresses/{id}:
    patch:
      operationId: updateCustomerAddress
      tags: [customers]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressInput"
      responses:
        "200":
          description: Address updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
    delete:
      operationId: deleteCustomerAddress
      tags: [customers]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Address deleted

  /customers/me/favorites:
    get:
      operationId: listFavorites
      tags: [customers]
      responses:
        "200":
          description: Favorite products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductSummary"

  /customers/me/favorites/{productId}:
    post:
      operationId: addFavorite
      tags: [customers]
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Added to favorites
    delete:
      operationId: removeFavorite
      tags: [customers]
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Removed from favorites

  # ─── REVIEWS ─────────────────────────────────────────────────────────────────
  /products/{id}/reviews:
    get:
      operationId: listProductReviews
      tags: [reviews]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Product reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  # ─── CONTENT (PUBLIC) ────────────────────────────────────────────────────────
  /content/settings:
    get:
      operationId: getSiteSettings
      tags: [content]
      responses:
        "200":
          description: Site settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  /content/banners:
    get:
      operationId: listBanners
      tags: [content]
      responses:
        "200":
          description: Homepage banners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Banner"

  /content/homepage:
    get:
      operationId: getHomepageContent
      tags: [content]
      responses:
        "200":
          description: Homepage sections and content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomepageContent"

  /content/faqs:
    get:
      operationId: listFaqs
      tags: [content]
      responses:
        "200":
          description: FAQs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Faq"

  # ─── ADMIN – DASHBOARD ───────────────────────────────────────────────────────
  /admin/dashboard/summary:
    get:
      operationId: getAdminDashboardSummary
      tags: [admin]
      responses:
        "200":
          description: Dashboard KPIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /admin/dashboard/sales-chart:
    get:
      operationId: getAdminSalesChart
      tags: [admin]
      parameters:
        - in: query
          name: period
          schema: { type: string, enum: [7d, 30d, 90d, 365d] }
      responses:
        "200":
          description: Sales chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesDataPoint"

  /admin/dashboard/recent-orders:
    get:
      operationId: getAdminRecentOrders
      tags: [admin]
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminOrderSummary"

  /admin/dashboard/top-products:
    get:
      operationId: getAdminTopProducts
      tags: [admin]
      responses:
        "200":
          description: Best-selling products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  /admin/dashboard/low-stock:
    get:
      operationId: getAdminLowStockProducts
      tags: [admin]
      responses:
        "200":
          description: Low-stock products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LowStockProduct"

  # ─── ADMIN – PRODUCTS ────────────────────────────────────────────────────────
  /admin/products:
    get:
      operationId: adminListProducts
      tags: [admin]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
      responses:
        "200":
          description: Admin product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProductListResponse"
    post:
      operationId: adminCreateProduct
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminProductInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProduct"

  /admin/products/{id}:
    get:
      operationId: adminGetProduct
      tags: [admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Admin product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProduct"
    patch:
      operationId: adminUpdateProduct
      tags: [admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProduct"
    delete:
      operationId: adminDeleteProduct
      tags: [admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /admin/products/{id}/stock:
    patch:
      operationId: adminUpdateProductStock
      tags: [admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockUpdateInput"
      responses:
        "200":
          description: Stock updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProduct"

  # ─── ADMIN – ORDERS ──────────────────────────────────────────────────────────
  /admin/orders:
    get:
      operationId: adminListOrders
      tags: [admin]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: paymentStatus
          schema: { type: string }
        - in: query
          name: governorateId
          schema: { type: integer }
        - in: query
          name: dateFrom
          schema: { type: string }
        - in: query
          name: dateTo
          schema: { type: string }
      responses:
        "200":
          description: Admin order list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrderListResponse"

  /admin/orders/{id}:
    get:
      operationId: adminGetOrder
      tags: [admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrder"
    patch:
