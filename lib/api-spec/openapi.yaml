# ─── COMPONENTS ──────────────────────────────────────────────────────────────
components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Auth ─────────────────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }

    CustomerRegisterInput:
      type: object
      required: [name, mobile, password]
      properties:
        name: { type: string }
        email: { type: ["string", "null"] }
        mobile: { type: string }
        password: { type: string }

    AuthResponse:
      type: object
      required: [customer]
      properties:
        customer:
          $ref: "#/components/schemas/Customer"

    AdminAuthResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/AdminUser"

    # ── Customer ─────────────────────────────────────────────────────────────
    Customer:
      type: object
      required: [id, name, mobile, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: ["string", "null"] }
        mobile: { type: string }
        isBlocked: { type: boolean }
        createdAt: { type: string }

    CustomerProfileUpdate:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        mobile: { type: string }

    AdminUser:
      type: object
      required: [id, name, email, role]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        role: { type: string }
        permissions: { type: array, items: { type: string } }

    # ── Address ──────────────────────────────────────────────────────────────
    Address:
      type: object
      required: [id, governorate, city, detailedAddress]
      properties:
        id: { type: integer }
        governorateId: { type: integer }
        governorate: { type: string }
        city: { type: string }
        detailedAddress: { type: string }
        landmark: { type: ["string", "null"] }
        isDefault: { type: boolean }

    AddressInput:
      type: object
      required: [governorateId, city, detailedAddress]
      properties:
        governorateId: { type: integer }
        city: { type: string }
        detailedAddress: { type: string }
        landmark: { type: string }
        isDefault: { type: boolean }

    # ── Products ─────────────────────────────────────────────────────────────
    ProductSummary:
      type: object
      required: [id, nameAr, slug, price, inStock]
      properties:
        id: { type: integer }
        nameAr: { type: string }
        nameEn: { type: ["string", "null"] }
        slug: { type: string }
        coverImage: { type: ["string", "null"] }
        price: { type: number }
        oldPrice: { type: ["number", "null"] }
        discountPercent: { type: ["integer", "null"] }
        inStock: { type: boolean }
        isBestSeller: { type: boolean }
        isNew: { type: boolean }
        isFeatured: { type: boolean }
        isOffer: { type: boolean }
        isRevision: { type: boolean }
        isBundle: { type: boolean }
        freeShipping: { type: boolean }
        freeShippingBadgeText: { type: ["string", "null"] }
        publisher: { type: ["string", "null"] }
        stage: { type: ["string", "null"] }
        grade: { type: ["string", "null"] }
        subject: { type: ["string", "null"] }
        category: { type: ["string", "null"] }
        educationType: { type: ["string", "null"] }
        schoolYear: { type: ["string", "null"] }
        author: { type: ["string", "null"] }

    Product:
      type: object
      required: [id, nameAr, slug, price, inStock, images]
      properties:
        id: { type: integer }
        nameAr: { type: string }
        nameEn: { type: ["string", "null"] }
        slug: { type: string }
        descriptionShort: { type: ["string", "null"] }
        descriptionFull: { type: ["string", "null"] }
        coverImage: { type: ["string", "null"] }
        images: { type: array, items: { type: string } }
        price: { type: number }
        oldPrice: { type: ["number", "null"] }
        discountPercent: { type: ["integer", "null"] }
        sku: { type: ["string", "null"] }
        barcode: { type: ["string", "null"] }
        inStock: { type: boolean }
        stockQuantity: { type: integer }
        isBestSeller: { type: boolean }
        isNew: { type: boolean }
        isFeatured: { type: boolean }
        isOffer: { type: boolean }
        freeShipping: { type: boolean }
        freeShippingBadgeText: { type: ["string", "null"] }
        isRevision: { type: boolean }
        isBundle: { type: boolean }
        educationType: { type: ["string", "null"] }
        bookType: { type: ["string", "null"] }
        edition: { type: ["string", "null"] }
        schoolYear: { type: ["string", "null"] }
        stage: { type: ["string", "null"] }
        grade: { type: ["string", "null"] }
        subject: { type: ["string", "null"] }
        publisher: { type: ["string", "null"] }
        author: { type: ["string", "null"] }
        avgRating: { type: ["number", "null"] }
        reviewCount: { type: integer }
        seoTitle: { type: ["string", "null"] }
        seoDescription: { type: ["string", "null"] }

    ProductListResponse:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProductSummary"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    SearchSuggestionsResponse:
      type: object
      required: [products, suggestions]
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/ProductSummary"
        suggestions:
          type: array
          items: { type: string }
        totalCount: { type: integer }

    # ── Categories ───────────────────────────────────────────────────────────
    Category:
      type: object
      required: [id, nameAr, slug]
      properties:
        id: { type: integer }
        nameAr: { type: string }
        nameEn: { type: ["string", "null"] }
        slug: { type: string }
        image: { type: ["string", "null"] }
        productCount: { type: integer }

    Stage:
      type: object
      required: [id, nameAr]
      properties:
        id: { type: integer }
        nameAr: { type: string }
        nameEn: { type: ["string", "null"] }
        sortOrder: { type: integer }
        isActive: { type: boolean }

    StageInput:
      type: object
      required: [nameAr]
      properties:
        nameAr: { type: string }
        nameEn: { type: string }
        sortOrder: { type: integer }

    StageUpdate:
      type: object
      properties:
        nameAr: { type: string }
        nameEn: { type: string }
        sortOrder: { type: integer }
        isActive: { type: boolean }

    Grade:
      type: object
      required: [id, nameAr, stageId]
      properties:
        id: { type: integer }
        nameAr: { type: string }
        nameEn: { type: ["string", "null"] }
        stageId: { type: integer }
        stageName: { type: ["string", "null"] }
        sortOrder: { type: integer }
        isActive: { type: boolean }

    GradeInput:
      type: object
      required: [nameAr, stageId]
      properties:
        nameAr: { type: string }
        nameEn: { type: string }
        stageId: { type: integer }
        sortOrder: { type: integer }

    GradeUpdate:
      type: object
      properties:
        nameAr: { type: string }
