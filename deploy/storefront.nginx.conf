server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  charset utf-8;
  server_tokens off;

  location = /healthz { access_log off; add_header Content-Type text/plain; return 200 "ok\n"; }
  location /assets/ { try_files $uri =404; expires 1y; add_header Cache-Control "public, max-age=31536000, immutable"; }
  location = /favicon.svg { expires 7d; }
  location / { try_files $uri $uri/ /index.html; add_header Cache-Control "no-cache"; }
}
