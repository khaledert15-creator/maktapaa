name: maktaba-production

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [database]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    security_opt: ["no-new-privileges:true"]

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        BUILD_VERSION: "${BUILD_VERSION:-development}"
    restart: "no"
    env_file: .env.production
    command: ["node", "--enable-source-maps", "./artifacts/api-server/dist/migrate.mjs"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [database]
    security_opt: ["no-new-privileges:true"]

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        BUILD_VERSION: "${BUILD_VERSION:-development}"
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [edge, database]
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5001/api/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  storefront:
    build:
      context: .
      dockerfile: Dockerfile.storefront
    restart: unless-stopped
    networks: [edge]
    read_only: true
    tmpfs: [/tmp, /var/cache/nginx, /var/run]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]

  caddy:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    environment:
      ACME_EMAIL: "${ACME_EMAIL:?ACME_EMAIL is required}"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      storefront:
        condition: service_healthy
    networks: [edge]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  edge:
  database:
    internal: true
