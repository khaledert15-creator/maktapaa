name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: maktaba_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d maktaba_ci"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/maktaba_ci
      SESSION_SECRET: ci-session-secret-with-at-least-32-characters
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:5173
      PUBLIC_SITE_URL: http://localhost:5173
      API_URL: http://localhost:5001
      EMAIL_PROVIDER: log
      STORAGE_PROVIDER: local
      PORT: 5001
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.34.5 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Validate clean PostgreSQL migration chain
        run: pnpm --filter @workspace/db migrate
      - name: Seed production-like fixtures
        run: pnpm --filter @workspace/api-server seed
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test
      - run: pnpm run build
      - name: Validate Compose model
        run: cp .env.production.example .env.production && docker compose --env-file .env.production -f docker-compose.production.yml config --quiet

  images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          build-args: BUILD_VERSION=${{ github.sha }}
          tags: ghcr.io/${{ github.repository_owner }}/maktaba-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build storefront production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.storefront
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/maktaba-storefront:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
